<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影片分段切割工具｜GitHub Pages 版</title>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root{
      --bg:#eef5ff;--card:#ffffff;--ink:#10233f;--muted:#64748b;--line:#d9e7f7;
      --primary:#2563eb;--primary2:#06b6d4;--ok:#16a34a;--warn:#a16207;--danger:#dc2626;
      --shadow:0 22px 55px rgba(15,35,70,.13);--radius:26px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;background:radial-gradient(circle at top left,#dcecff 0,#f8fbff 35%,#edf4ff 100%);color:var(--ink);line-height:1.7}
    .wrap{max-width:1180px;margin:0 auto;padding:34px 20px 60px}
    .hero{background:linear-gradient(135deg,#10233f,#1d4ed8 58%,#0891b2);color:#fff;border-radius:34px;padding:38px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .hero:after{content:"";position:absolute;right:-90px;top:-90px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.12)}
    h1{margin:0;font-size:clamp(2rem,4vw,3.5rem);letter-spacing:.03em}.hero p{font-size:1.15rem;max-width:760px;color:#eaf4ff}.badge{display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);padding:8px 14px;border-radius:999px;font-weight:700;margin-bottom:14px}
    .panel{background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;margin-top:24px}
    h2{font-size:1.65rem;margin:0 0 18px;color:#0f3569}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}.drop{border:3px dashed #a7c4ea;background:#f8fbff;border-radius:24px;padding:34px;text-align:center;transition:.2s;cursor:pointer;min-height:245px;display:flex;align-items:center;justify-content:center;flex-direction:column}.drop:hover,.drop.drag{border-color:var(--primary);background:#eff6ff;transform:translateY(-2px)}.drop .icon{font-size:4rem}.drop strong{font-size:1.35rem}.drop span{color:var(--muted)}input[type=file]{display:none}
    .controls{display:grid;gap:14px}.field{background:#f8fbff;border:1px solid var(--line);border-radius:18px;padding:16px}.field label{display:block;font-weight:800;margin-bottom:8px}.field input,.field select{width:100%;font-size:1.05rem;border:1px solid #cbd5e1;border-radius:14px;padding:12px;background:#fff;color:var(--ink)}.btns{display:flex;gap:12px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:13px 18px;font-size:1rem;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 12px 24px rgba(37,99,235,.25)}.btn.secondary{background:#0f172a}.btn.gray{background:#64748b}.btn:disabled{opacity:.45;cursor:not-allowed}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:18px;padding:14px 16px;font-weight:700}.status{background:#f8fbff;border:1px solid var(--line);border-radius:20px;padding:18px;margin-top:18px}.bar{height:18px;background:#dbe7f3;border-radius:999px;overflow:hidden}.bar>div{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--primary2));transition:.2s}.statusText{margin-top:10px;color:var(--muted);font-weight:700}.files,.results{display:grid;gap:16px}.fileCard,.resultCard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 12px 26px rgba(15,35,70,.07)}.fileHead{display:flex;justify-content:space-between;gap:12px;align-items:center}.fileName{font-weight:900;word-break:break-all}.pill{background:#e0f2fe;color:#075985;border-radius:999px;padding:4px 10px;font-weight:800;font-size:.9rem;white-space:nowrap}video{width:100%;max-height:240px;border-radius:18px;background:#000;margin-top:12px}.segGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:12px}.segTitle{font-weight:900}.download{display:inline-block;text-decoration:none;color:#fff;background:#16a34a;border-radius:12px;padding:9px 13px;font-weight:900;margin-top:10px}.small{font-size:.92rem;color:var(--muted)}.footer{text-align:center;color:var(--muted);margin-top:25px;font-weight:700}@media(max-width:860px){.grid{grid-template-columns:1fr}.hero{padding:28px}.panel{padding:20px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">🎬 GitHub Pages 純前端版</div>
      <h1>影片多檔分段切割工具</h1>
      <p>可一次上傳多個 MP4 影片，輸入要平均切成幾段，瀏覽器會直接使用 FFmpeg.wasm 在本機端處理，完成後可預覽、個別下載或打包 ZIP 下載。</p>
    </section>

    <section class="panel">
      <h2>一、上傳與設定</h2>
      <div class="grid">
        <label class="drop" id="dropZone">
          <div class="icon">📁</div>
          <strong>拖曳影片到這裡，或點擊選擇多個 MP4</strong>
          <span>影片不會上傳到伺服器，全部在你的瀏覽器內處理</span>
          <input id="fileInput" type="file" accept="video/mp4,video/*" multiple />
        </label>
        <div class="controls">
          <div class="field">
            <label for="partsInput">每個影片要平均切成幾段</label>
            <input id="partsInput" type="number" min="2" max="30" value="3" />
          </div>
          <div class="field">
            <label for="modeSelect">切割模式</label>
            <select id="modeSelect">
              <option value="copy" selected>快速模式：不重新編碼，速度較快</option>
              <option value="reencode">穩定模式：重新編碼，較慢但切點較穩</option>
            </select>
          </div>
          <div class="btns">
            <button class="btn" id="startBtn">開始切割</button>
            <button class="btn secondary" id="zipBtn" disabled>一鍵下載 ZIP</button>
            <button class="btn gray" id="clearBtn">清除</button>
          </div>
          <div class="notice">提醒：請用 GitHub Pages、Live Server 或 HTTPS 網址開啟，不要用 file:// 直接開啟。</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>二、執行狀態</h2>
      <div class="status">
        <div class="bar"><div id="progressBar"></div></div>
        <div class="statusText" id="statusText">尚未開始。請先選擇影片檔案。</div>
      </div>
    </section>

    <section class="panel">
      <h2>三、已選擇檔案</h2>
      <div class="files" id="fileList"></div>
    </section>

    <section class="panel">
      <h2>四、分段結果</h2>
      <div class="results" id="results"></div>
    </section>

    <div class="footer">HTML + FFmpeg.wasm + JSZip｜可部署於 GitHub Pages</div>
  </main>

<script>
const { FFmpeg } = FFmpegWASM;
const { fetchFile, toBlobURL } = FFmpegUtil;

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileList = document.getElementById('fileList');
const results = document.getElementById('results');
const startBtn = document.getElementById('startBtn');
const zipBtn = document.getElementById('zipBtn');
const clearBtn = document.getElementById('clearBtn');
const partsInput = document.getElementById('partsInput');
const modeSelect = document.getElementById('modeSelect');
const progressBar = document.getElementById('progressBar');
const statusText = document.getElementById('statusText');

let selectedFiles = [];
let ffmpeg = null;
let ffmpegLoaded = false;
let ffmpegLoadingPromise = null;
let allSegments = [];

function setStatus(text, percent = null) {
  statusText.textContent = text;
  if (percent !== null) progressBar.style.width = Math.max(0, Math.min(100, percent)) + '%';
}

function safeName(name) {
  return name.replace(/\.[^/.]+$/, '').replace(/[^a-zA-Z0-9_\-\u4e00-\u9fa5]/g, '_');
}

function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const units = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + units[i];
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
}

function getVideoDuration(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const video = document.createElement('video');
    video.preload = 'metadata';
    video.onloadedmetadata = () => {
      URL.revokeObjectURL(url);
      resolve(video.duration);
    };
    video.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('無法讀取影片長度'));
    };
    video.src = url;
  });
}

function renderFiles() {
  fileList.innerHTML = '';
  if (selectedFiles.length === 0) {
    fileList.innerHTML = '<div class="small">尚未選擇檔案。</div>';
    return;
  }
  selectedFiles.forEach((file, idx) => {
    const card = document.createElement('div');
    card.className = 'fileCard';
    card.innerHTML = `
      <div class="fileHead">
        <div class="fileName">${idx + 1}. ${file.name}</div>
        <div class="pill">${formatBytes(file.size)}</div>
      </div>
      <video controls src="${URL.createObjectURL(file)}"></video>
    `;
    fileList.appendChild(card);
  });
}

async function loadFFmpeg() {
  if (ffmpegLoaded && ffmpeg) return ffmpeg;
  if (ffmpegLoadingPromise) return ffmpegLoadingPromise;

  ffmpegLoadingPromise = (async () => {
    try {
      ffmpeg = new FFmpeg();
      ffmpeg.on('log', ({ message }) => console.log(message));
      ffmpeg.on('progress', ({ progress }) => {
        const now = Number.isFinite(progress) ? progress * 100 : 0;
        progressBar.style.width = Math.min(98, Math.max(0, now)).toFixed(1) + '%';
      });

      setStatus('正在載入 FFmpeg.wasm，第一次會比較久...', 5);
      const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd';
      await ffmpeg.load({
        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
        workerURL: await toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, 'text/javascript')
      });
      ffmpegLoaded = true;
      setStatus('FFmpeg 載入完成，可以開始切割。', 10);
      return ffmpeg;
    } catch (e) {
      ffmpegLoaded = false;
      ffmpeg = null;
      throw e;
    } finally {
      ffmpegLoadingPromise = null;
    }
  })();

  return ffmpegLoadingPromise;
}

async function splitOneFile(file, n, fileIndex, totalFiles) {
  const duration = await getVideoDuration(file);
  if (!duration || duration <= 0) throw new Error('影片長度不正確');

  const base = safeName(file.name);
  const inputName = `${base}_${Date.now()}_${fileIndex}.mp4`;
  const api = await loadFFmpeg();
  await api.writeFile(inputName, await fetchFile(file));
  const partLen = duration / n;

  const group = document.createElement('div');
  group.className = 'fileCard';
  group.innerHTML = `
    <div class="fileHead">
      <div>
        <div class="fileName">${file.name}</div>
        <div class="small">總長度：${formatTime(duration)}，平均切成 ${n} 段</div>
      </div>
      <div class="pill">影片 ${fileIndex + 1}/${totalFiles}</div>
    </div>
    <div class="segGrid"></div>
  `;
  results.appendChild(group);
  const segGrid = group.querySelector('.segGrid');

  for (let i = 0; i < n; i++) {
    const start = i * partLen;
    const segDur = Math.min(partLen, duration - start);
    if (segDur <= 0) continue;
    const outName = `${base}_part${String(i + 1).padStart(2, '0')}.mp4`;
    const args = modeSelect.value === 'reencode'
      ? ['-ss', start.toFixed(3), '-i', inputName, '-t', segDur.toFixed(3), '-c:v', 'libx264', '-preset', 'ultrafast', '-c:a', 'aac', '-movflags', '+faststart', outName]
      : ['-ss', start.toFixed(3), '-i', inputName, '-t', segDur.toFixed(3), '-c', 'copy', '-avoid_negative_ts', 'make_zero', outName];

    setStatus(`正在切割：${file.name}｜第 ${i + 1}/${n} 段`, ((fileIndex / totalFiles) * 100) + ((i / n) * (100 / totalFiles)));
    await api.exec(args);
    const data = await api.readFile(outName);
    const blob = new Blob([data.buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    allSegments.push({ name: outName, blob });

    const seg = document.createElement('div');
    seg.className = 'resultCard';
    seg.innerHTML = `
      <div class="segTitle">${outName}</div>
      <div class="small">${formatTime(start)} - ${formatTime(start + segDur)}｜${formatBytes(blob.size)}</div>
      <video controls src="${url}"></video>
      <a class="download" href="${url}" download="${outName}">下載此段</a>
    `;
    segGrid.appendChild(seg);
    try { await api.deleteFile(outName); } catch(e) {}
  }
  try { await api.deleteFile(inputName); } catch(e) {}
}

function addFiles(files) {
  selectedFiles = Array.from(files).filter(f => f.type.startsWith('video/') || f.name.toLowerCase().endsWith('.mp4'));
  renderFiles();
  setStatus(`已選擇 ${selectedFiles.length} 個影片檔。`, 0);
}

fileInput.addEventListener('change', e => addFiles(e.target.files));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); addFiles(e.dataTransfer.files); });

startBtn.addEventListener('click', async () => {
  try {
    const n = parseInt(partsInput.value, 10);
    if (!selectedFiles.length) return alert('請先選擇影片檔案。');
    if (!Number.isInteger(n) || n < 2) return alert('切割段數必須大於或等於 2。');
    startBtn.disabled = true; zipBtn.disabled = true; results.innerHTML = ''; allSegments = [];
    await loadFFmpeg();
    for (let i = 0; i < selectedFiles.length; i++) {
      await splitOneFile(selectedFiles[i], n, i, selectedFiles.length);
    }
    setStatus(`全部完成！共產生 ${allSegments.length} 個分段檔案。`, 100);
    zipBtn.disabled = allSegments.length === 0;
  } catch (err) {
    console.error(err);
    setStatus('發生錯誤：' + (err && err.message ? err.message : err), 0);
    alert('發生錯誤：' + (err && err.message ? err.message : err));
  } finally {
    startBtn.disabled = false;
  }
});

zipBtn.addEventListener('click', async () => {
  if (!allSegments.length) return;
  setStatus('正在打包 ZIP...', 95);
  const zip = new JSZip();
  allSegments.forEach(seg => zip.file(seg.name, seg.blob));
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'video_segments.zip'; a.click();
  URL.revokeObjectURL(url);
  setStatus('ZIP 下載完成。', 100);
});

clearBtn.addEventListener('click', () => {
  selectedFiles = []; allSegments = []; fileInput.value = ''; results.innerHTML = ''; renderFiles(); zipBtn.disabled = true; setStatus('已清除。', 0);
});

renderFiles();
</script>
</body>
</html>
